# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
#            COMMON PROPERTIES
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
spring.config.import=optional:classpath:environment-variables.properties
spring.application.name=${APP_NAME:offer}
server.servlet.context-path=${SERVLET_CONTEXT_PATH:/api/v1}
server.port=${SERVER_PORT:8080}
spring.jackson.time-zone=Europe/Istanbul
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
#          JPA - DATASOURCE
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DATASOURCE_URL}
spring.datasource.username=${DATASOURCE_USERNAME}
spring.datasource.password=${DATASOURCE_PASSWORD}
spring.jpa.properties.hibernate.jdbc.batch_size=${DATASOURCE_JDBC_BATCH_SIZE:50}
spring.jpa.properties.hibernate.jdbc.fetch_size=${DATASOURCE_JDBC_FETCH_SIZE:100}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.default_batch_fetch_size=30
spring.jpa.properties.hibernate.jdbc.time_zone=Europe/Istanbul
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
#             THREAD
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
spring.threads.virtual.enabled=true
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
#             SECURITY
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
app.security.jwt-secret=${APP_SECURITY_JWT_SECRET}
app.security.jwt-expiration=${APP_SECURITY_JWT_EXPIRATON}
app.security.cookie.strict=false
app.security.cors-allowed-origins=${APP_SECURITY_CORS_ALLOWED_ORIGINS}
app.security.cors-allowed-headers=${APP_SECURITY_CORS_ALLOWED_HEADERS}
app.security.cors-exposed-headers=${APP_SECURITY_CORS_EXPOSED_HEADERS}
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
#             MONITORING
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
management.endpoint.health.show-details=ALWAYS
management.endpoints.web.exposure.include=caches,health,info,metrics,threaddump
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
#    DATABASE CHANGE LOG (LIQUIBASE)
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
#               EMAIL
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
#             FRONTEND
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
app.frontend.base-url=http://localhost:4200
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
#             KEYCLOAK
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
keycloak.auth-server-url=https://keycloak.1teklif.com
keycloak.realm=my-project-realm
keycloak.admin-cli-client-id=admin-cli
keycloak.admin-cli-client-secret=qbNTCWU94eOg6MHFfiFjXHXNZ8X5hSvw
keycloak.resource=my-project-client

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://keycloak.1teklif.com/realms/my-project-realm/protocol/openid-connect/certs
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://keycloak.1teklif.com/realms/my-project-realm
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
#             JOBRUNR
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
jobrunr.dashboard.enabled=true
jobrunr.dashboard.port=18000
jobrunr.background-job-server.enabled=true
# First time run: false, next time run: true
jobrunr.database.skip-create=true
jobrunr.background-job-server.worker-count=2

logging.level.org.liquibase=DEBUG
logging.level.liquibase=DEBUG
