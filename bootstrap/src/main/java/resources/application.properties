# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
#            COMMON PROPERTIES
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
spring.application.name=offer
server.servlet.context-path=/api/v1
server.port=8080
spring.jackson.time-zone=Europe/Istanbul
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
#          JPA - DATASOURCE
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/offer?serverTimezone=Europe/Istanbul
spring.datasource.username=postgres
spring.datasource.password=caksuna123.
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.jdbc.fetch_size=100
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.default_batch_fetch_size=30
spring.jpa.properties.hibernate.generate_statistics=true
spring.jpa.properties.hibernate.jdbc.time_zone=Europe/Istanbul
#spring.jpa.open-in-view=false
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
#             THREAD
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
spring.threads.virtual.enabled=true
spring.docker.compose.enabled=false
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
#             MONITORING
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
management.endpoint.health.show-details=ALWAYS
management.endpoints.web.exposure.include=caches,health,info,metrics,threaddump
